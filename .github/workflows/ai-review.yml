name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get diff
        run: |
          git diff ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} > diff.txt || true
          if [ ! -s diff.txt ]; then
            echo "No diff" > diff.txt
          fi
          head -c 20000 diff.txt > short_diff.txt

      - name: Build request.json
        run: |
          DIFF=$(cat short_diff.txt | sed 's/"/\\"/g' | tr '\n' ' ')
          echo "{\"model\":\"gpt-5.4\",\"input\":\"Review this PR: $DIFF\"}" > request.json

      - name: Call AI
        run: |
          curl -sS http://100.97.129.55:8080/v1/responses \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            -H "Content-Type: application/json" \
            --data @request.json \
            -o result.json

          echo "=== RESULT ==="
          cat result.json

      - name: Extract response
        run: |
          jq -r '.output_text // .choices[0].message.content // "No response"' result.json > review.md

      - name: Comment PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body-file review.md