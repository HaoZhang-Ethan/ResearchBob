name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ 修复 diff（不会再报错）
      - name: Get diff
        run: |
          git diff ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} > diff.txt || true

          if [ ! -s diff.txt ]; then
            echo "No diff found" > diff.txt
          fi

          head -c 20000 diff.txt > short_diff.txt

      # ✅ 用 Python 生成 JSON（彻底避免转义问题）
      - name: Build request.json
        run: |
          python3 - << 'EOF'
import json

with open("short_diff.txt", "r", encoding="utf-8", errors="ignore") as f:
    diff = f.read()

prompt = f"""You are a senior engineer.

Review this PR and only report real issues.

Focus on:
- bugs
- security
- performance

Return markdown with summary and findings.

Diff:
{diff}
"""

body = {
    "model": "gpt-5.4",
    "input": prompt
}

with open("request.json", "w", encoding="utf-8") as f:
    json.dump(body, f, ensure_ascii=False)
EOF

      # ✅ 调用你的中转
      - name: Call AI
        run: |
          curl -sS http://100.97.129.55:8080/v1/responses \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            -H "Content-Type: application/json" \
            --data @request.json \
            -o result.json

          echo "=== RAW RESULT ==="
          cat result.json

      # ✅ 更稳的解析（兼容多种格式）
      - name: Extract response
        run: |
          python3 - << 'EOF'
import json

with open("result.json", "r", encoding="utf-8", errors="ignore") as f:
    data = json.load(f)

text = None

if isinstance(data, dict):
    text = data.get("output_text")

    if not text and "choices" in data:
        try:
            text = data["choices"][0]["message"]["content"]
        except:
            pass

    if not text and "output" in data:
        try:
            parts = []
            for item in data["output"]:
                for c in item.get("content", []):
                    if c.get("type") in ("output_text", "text"):
                        parts.append(c.get("text", ""))
            text = "\n".join(parts)
        except:
            pass

if not text:
    text = "AI review done, but could not parse response."

with open("review.md", "w", encoding="utf-8") as f:
    f.write(text)
EOF

      - name: Comment PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body-file review.md