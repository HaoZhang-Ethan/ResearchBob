name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD > diff.txt
          head -c 20000 diff.txt > short_diff.txt

      - name: Build request.json
        run: |
          python3 << 'EOF'
import json

with open("short_diff.txt", "r", encoding="utf-8", errors="ignore") as f:
    diff = f.read()

prompt = f"""You are a senior engineer.

Review this PR and find real issues only.

Check:
- bugs
- performance
- security

Return markdown with summary and findings.

Diff:
{diff}
"""

body = {
    "model": "gpt-5.4",
    "input": prompt
}

with open("request.json", "w", encoding="utf-8") as f:
    json.dump(body, f, ensure_ascii=False)
EOF

      - name: Call AI
        run: |
          curl -sS http://100.97.129.55:8080/v1/responses \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            -H "Content-Type: application/json" \
            --data @request.json \
            -o result.json

          echo "=== RESULT ==="
          cat result.json

      - name: Extract response
        run: |
          python3 << 'EOF'
import json

with open("result.json", "r", encoding="utf-8", errors="ignore") as f:
    data = json.load(f)

text = None

if isinstance(data, dict):
    text = data.get("output_text")

    if not text and "choices" in data:
        try:
            text = data["choices"][0]["message"]["content"]
        except:
            pass

if not text:
    text = "AI review done, but could not parse response."

with open("review.md", "w", encoding="utf-8") as f:
    f.write(text)
EOF

      - name: Comment PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body-file review.md
